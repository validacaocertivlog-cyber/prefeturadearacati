<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de Certidão</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.topo {
  background: #0f7f79;
  color: white;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  display: flex;
}

.menu {
  width: 220px;
  background: #1f2d3d;
  color: white;
  min-height: 100vh;
  padding: 15px;
}

.menu h3 {
  margin-top: 0;
}

.menu p {
  margin: 10px 0;
}

.conteudo {
  flex: 1;
  padding: 20px;
}

.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  border-radius: 6px;
  width: 320px;
  box-shadow: 0 2px 5px rgba(0,0,0,.1);
}

.card-header {
  background: #0f7f79;
  color: white;
  padding: 10px;
  font-weight: bold;
}

.card-body {
  padding: 15px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

button {
  background: #7bc043;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #6aa737;
}
</style>

</head>

<body>

<div class="topo">
SISTEMA DE VALIDAÇÃO DE CERTIDÃO - PREFEITURA DE ARACATI
</div>

<div class="container">

<div class="menu">
<h3>Menu</h3>
<p>Início</p>
<p>Validar Documento</p>
<p>Consultar</p>
</div>

<div class="conteudo">

<h2>Validar Certidão</h2>

<div class="grid">

<div class="card">
<div class="card-header">Certidão do Imóvel</div>
<div class="card-body">

<label>Inscrição do Imóvel*</label> <input type="text" id="inscricao">

<label>Código de Validação*</label> <input type="text" id="codigo">

<button onclick="validar()">Consultar</button>

</div>
</div>

<div class="card">
<div class="card-header">Certidão da Empresa</div>
<div class="card-body">
<input type="text" placeholder="Inscrição">
<input type="text" placeholder="Código">
<button>Consultar</button>
</div>
</div>

<div class="card">
<div class="card-header">Certidão do Contribuinte</div>
<div class="card-body">
<input type="text" placeholder="CPF/CNPJ">
<input type="text" placeholder="Código">
<button>Consultar</button>
</div>
</div>

</div>

</div>

</div>

<script>

const documentos = [
{
codigo: "0003E400A00000033680",
inscricao: "02740"
}
];

function validar() {

const codigo = document.getElementById("codigo").value.trim().toUpperCase();
const inscricao = document.getElementById("inscricao").value.trim();

const encontrado = documentos.find(doc =>
doc.codigo.toUpperCase() === codigo &&
doc.inscricao === inscricao
);

if (encontrado) {
window.location.href = "resultado.html";
} else {
alert("Código ou inscrição inválidos.");
}

}

</script>

</body>
</html>
